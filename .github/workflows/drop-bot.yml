name: INTW Drop Bot

on:
  schedule:
    # Runs every 15 minutes, Mon–Fri, 11:00 AM – 11:00 PM UTC
    - cron: "*/15 11-23 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the daily state file back to the repo

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run drop bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          RH_ACCOUNT_NUMBER: ${{ secrets.RH_ACCOUNT_NUMBER }}
        run: node drop-bot.js

      - name: Commit updated state file
        run: |
          git config user.name "rsi-bot"
          git config user.email "rsi-bot@users.noreply.github.com"
          git add bought-today.json
          git diff --staged --quiet || git commit -m "Update daily buy state [skip ci]"
          git push