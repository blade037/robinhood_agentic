name: RSI Buy Bot

on:
  schedule:
    # Runs every 10 minutes, Mon–Fri
    # UTC 08:00–20:00 = 4:00 AM–4:00 PM ET year-round
    # (covers EST: 3 AM–3 PM | EDT: 4 AM–4 PM)
    - cron: "*/10 8-20 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run RSI buy bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          RH_ACCOUNT_NUMBER: ${{ secrets.RH_ACCOUNT_NUMBER }}
        run: node bot.js
