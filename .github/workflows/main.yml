name: RSI Buy Bot

on:
  schedule:
    # Runs every 15 minutes during regular market hours (Mon–Fri, 9:30 AM – 4:00 PM EST)
    # EST = UTC-5 | 9:30 AM EST = 14:30 UTC | 4:00 PM EST = 21:00 UTC
    # Cron starts at 14:00 UTC (closest to 14:30 without going under)
    - cron: "30-59/15 14 * * 1-5"  # 14:30, 14:45 UTC
    - cron: "*/15 15-20 * * 1-5"   # 15:00–20:45 UTC
    - cron: "0 21 * * 1-5"          # 21:00 UTC (4:00 PM EST final run)

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run RSI buy bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          RH_ACCOUNT_NUMBER: ${{ secrets.RH_ACCOUNT_NUMBER }}
        run: node bot.js