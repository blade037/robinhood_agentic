name: RSI Buy Bot

on:
  schedule:
    # Runs every 15 minutes, Mon–Fri, 11:00 AM – 9:00 PM UTC
    - cron: "*/15 11-21 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run RSI buy bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          RH_ACCOUNT_NUMBER: ${{ secrets.RH_ACCOUNT_NUMBER }}
        run: node bot.js